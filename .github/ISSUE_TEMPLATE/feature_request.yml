name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this useful? Any constraints?
    validations:
      required: false
