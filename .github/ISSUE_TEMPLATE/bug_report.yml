name: Bug report
description: Report a functional bug or regression
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Include expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: Code snippet or steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: MCU/RTOS/toolchain/flags, commit/tag, and how you integrated.
    validations:
      required: false

