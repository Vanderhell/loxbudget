name: Bug report
description: Report a problem with loxbudget
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps / code
      description: Minimal steps or a small snippet to reproduce.
      render: c
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Toolchain, OS, target, and build flags.
    validations:
      required: false
