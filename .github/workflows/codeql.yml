name: codeql

on:
  push:
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
      - run: make all
      - uses: github/codeql-action/analyze@v3

