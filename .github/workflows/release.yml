name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - run: python3 tools/amalgamate.py
      - run: cp single_header/loxbudget.h loxbudget.h
      - run: sha256sum loxbudget.h > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            loxbudget.h
            SHA256SUMS

